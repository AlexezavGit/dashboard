name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy dashboard-mhpss

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build
        env:
          # Non-sensitive build-time vars (safe in CI)
          VITE_ACTIVITYINFO_DB_ID: ${{ vars.ACTIVITYINFO_DB_ID }}
          VITE_ACTIVITYINFO_FORM_ID: ${{ vars.ACTIVITYINFO_FORM_ID }}
          VITE_KOBO_ASSET_ID: ${{ vars.KOBO_ASSET_ID }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ccf4cbf0a8234b639c049c7dd1c627ae

      # Worker Secrets are set separately via wrangler CLI — they are NOT in this file.
      # To set/update:
      #   npx wrangler secret put KOBO_API_TOKEN          → paste: 66bb52de75381723cdaec050cf9ffa5ae05fbb5d
      #   npx wrangler secret put ACTIVITYINFO_API_KEY    → paste token after registration
