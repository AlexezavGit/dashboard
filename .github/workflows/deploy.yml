name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Preview check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build
        env:
          VITE_ACTIVITYINFO_DB_ID: ${{ vars.ACTIVITYINFO_DB_ID }}
          VITE_ACTIVITYINFO_FORM_ID: ${{ vars.ACTIVITYINFO_FORM_ID }}
          VITE_KOBO_ASSET_ID: ${{ vars.KOBO_ASSET_ID }}

# NOTE: Cloudflare Pages deploys AUTOMATICALLY from the connected GitHub repo.
# No wrangler deploy step needed here — Pages watches the `main` branch
# and builds/deploys on every push.
#
# This workflow just validates the build succeeds before Pages picks it up.
#
# SECRETS to add in Pages Dashboard (NOT in GitHub):
#   Cloudflare → Pages → dashboard → Settings → Environment Variables:
#   KOBO_API_TOKEN = 66bb52de75381723cdaec050cf9ffa5ae05fbb5d  (secret, production)
#   ACTIVITYINFO_API_KEY = <token after registration>           (secret, production)
#
# OPTIONAL — for manual deploys via wrangler pages deploy:
#   GitHub repo → Settings → Secrets → CLOUDFLARE_API_TOKEN
#   Token permissions needed:
#     - Cloudflare Pages: Edit
#     - Account Settings: Read
